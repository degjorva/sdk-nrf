# Exercises the CRACEN ML-DSA verify driver round-trip against the
# Oberon ML-DSA sign+keygen driver. PSA dispatches verify_message /
# verify_hash to CRACEN (PSA_NEED_CRACEN_ML_DSA_VERIFY is selected
# automatically); sign_message and key generation stay on Oberon
# (PSA_NEED_OBERON_ML_DSA_SIGN is gated on PSA_ACCEL_ML_DSA, which we
# never select in v1).

CONFIG_ZTEST=y
# ML-DSA-87 verify with MLD_CONFIG_REDUCE_RAM has a working set of ~41 KB
# (see mldsa-native/mldsa/mldsa_native.h) and Oberon's sign side ocrypto
# context is similarly large. 65536 leaves headroom for both ends of the
# round-trip plus the test's own buffers.
CONFIG_ZTEST_STACK_SIZE=65536

CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384

CONFIG_CONSOLE=y
CONFIG_LOG=y

CONFIG_PSA_CRYPTO=y
CONFIG_PSA_CRYPTO_DRIVER_CRACEN=y
CONFIG_PSA_CRYPTO_DRIVER_OBERON=y

CONFIG_MBEDTLS_ENABLE_HEAP=y
# PSA needs heap for key slot storage. 16 KB comfortably fits the largest
# ML-DSA-87 key pair (2592 B pub + ~4900 B priv) plus PSA bookkeeping.
CONFIG_MBEDTLS_HEAP_SIZE=16384

# Pull in pure ML-DSA + HashML-DSA(SHA-256).
CONFIG_PSA_WANT_ALG_ML_DSA=y
CONFIG_PSA_WANT_ALG_DETERMINISTIC_ML_DSA=y
CONFIG_PSA_WANT_ALG_HASH_ML_DSA=y
CONFIG_PSA_WANT_ALG_DETERMINISTIC_HASH_ML_DSA=y
CONFIG_PSA_WANT_KEY_TYPE_ML_DSA_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_ML_DSA_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ML_DSA_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_ML_DSA_KEY_SIZE_44=y
CONFIG_PSA_WANT_ML_DSA_KEY_SIZE_65=y
CONFIG_PSA_WANT_ML_DSA_KEY_SIZE_87=y

# Prehash for HashML-DSA - SHA-256 is the most common case and is the
# one we'll exercise here.
CONFIG_PSA_WANT_ALG_SHA_256=y

# A tested round-trip needs both sign (Oberon) and verify (CRACEN).
CONFIG_PSA_WANT_GENERATE_RANDOM=y
