CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=16384

CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=8192

CONFIG_CONSOLE=y
CONFIG_LOG=y

# PSA crypto must be initialized so the CRACEN driver and BA418 power-up code
# is exercised normally; the XOF tests then poke sx_xof_* directly.
CONFIG_PSA_CRYPTO=y
CONFIG_PSA_CRYPTO_DRIVER_CRACEN=y

CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192

# Bring SHA-256 in so the "concurrent with PSA hash" test has something to
# interleave with the XOF squeeze loop.
CONFIG_PSA_WANT_ALG_SHA_256=y

# The internal CRACEN streaming XOF API is selected by the test-image-only
# TEST_CRACEN_XOF symbol (see Kconfig).
