# TF-M integration
CONFIG_TFM_PARTITION_PLATFORM=y
CONFIG_TFM_PARTITION_INITIAL_ATTESTATION=y
CONFIG_TFM_NRF_PROVISIONING=y

# PSA Crypto algorithms and key types needed by the manufacturing flow
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_PURE_EDDSA=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_ECC_TWISTED_EDWARDS_255=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_GENERATE_RANDOM=y

# TF-M logging (set to silence for cleaner manufacturing output; enable for debugging)
CONFIG_TFM_LOG_LEVEL_SILENCE=y

# Zephyr logging (used for debug-level internal traces; manufacturing output uses printk)
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# MCUboot: manufacturing app must be built as an MCUboot-compatible image
CONFIG_BOOTLOADER_MCUBOOT=y

# Flash access (needed to read flash regions for image validation)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Stack size: increased to accommodate PSA crypto operations and TF-M IPC
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Reboot support (used in step 12)
CONFIG_REBOOT=y
