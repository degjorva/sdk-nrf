# In DTS builds BOOT_MAX_IMG_SECTORS_AUTO defaults to y (see
# bootloader/mcuboot/boot/zephyr/Kconfig:888 "default y if !PARTITION_MANAGER_ENABLED"),
# so BOOT_MAX_IMG_SECTORS is computed automatically from the DTS partition layout and
# cannot be set here.

CONFIG_PCD_READ_NETCORE_APP_VERSION=y
